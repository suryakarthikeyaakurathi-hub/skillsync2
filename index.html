<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSync - Student Collaboration & Skill Sharing Platform</title>
    <!-- PWA Descriptor Elements -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/logo-192.svg" />
    <link rel="apple-touch-icon" href="/logo-192.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SkillSync PWA: Service Worker registered successfully:', reg.scope))
            .catch(err => console.warn('SkillSync PWA: Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
